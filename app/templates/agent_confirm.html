{% extends "base.html" %}
{% block content %}
<h1 class="page-title mb-4">Confirm change</h1>
<div class="card p-4">
  {% if error %}
  <p class="text-danger">{{ error }}</p>
  <p><a href="{{ url_for('dashboard.index') }}">Back to dashboard</a></p>
  {% else %}
  <p class="fs-5 mb-3">{{ diff_line }}</p>
  <form method="post" action="{{ url_for('agent.confirm_change') }}" class="d-inline">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="token" value="{{ token }}">
    <button type="submit" class="btn btn-primary">Confirm change</button>
  </form>
  <a href="{{ url_for('dashboard.index') }}" class="btn btn-link text-secondary">Discard change</a>
  {% endif %}
</div>
{% endblock %}
