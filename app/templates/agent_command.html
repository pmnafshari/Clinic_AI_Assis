{% extends "base.html" %}
{% block content %}
<div class="card-wide">
  <h1>Run a command</h1>
  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post" action="{{ url_for('agent.command_page') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="command">command</label>
    <textarea id="command" name="command" rows="4" autofocus>{{ command or '' }}</textarea>
    <button type="submit">Run command</button>
  </form>
</div>
{% endblock %}
