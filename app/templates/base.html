<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dental AI Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap/5.3.3/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap-icons/1.11.3/bootstrap-icons.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token() }}"}'>
  {% if request.endpoint != 'auth.login' %}
    {% include "_sidebar.html" %}
  {% endif %}
  <main class="content{{ ' content-shifted' if request.endpoint != 'auth.login' else '' }}">
    {% with messages = get_flashed_messages() %}
      {% if messages %}<div class="alert alert-primary">{{ messages[0] }}</div>{% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='vendor/bootstrap/5.3.3/bootstrap.bundle.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/htmx/1.9.12/htmx.min.js') }}"></script>
</body>
</html>
